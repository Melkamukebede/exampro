function closePracticeModal() { clearInterval(examTimer); document.getElementById('practiceModal').style.display='none'; }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Results – ExamMaster Pro</title>
    <style>
        /* Same root, premium, nav styles as above (condensed here for brevity) */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --primary: #10b981; --primary-dark: #059669; --secondary: #3b82f6;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --dark: #0f172a; --darker: #0a0f1f; --light: #e2e8f0;
            --gray: #94a3b8; --card-bg: #1e293b; --border: #334155;
        }
        body { font-family:'Segoe UI',Roboto,sans-serif; background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%); color:var(--light); min-height:100vh; padding:12px; }
        .premium-banner { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); border-radius:20px; padding:6px 14px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:12px; font-size:0.75rem; }
        .premium-banner span { color:white; font-weight:bold; display:flex; align-items:center; gap:4px; }
        .premium-badge { background:var(--dark); color:var(--primary); padding:2px 8px; border-radius:20px; font-size:10px; }
        .upgrade-btn { background:var(--warning); color:var(--dark); padding:2px 8px; border-radius:20px; cursor:pointer; border:none; font-size:10px; display:flex; align-items:center; gap:4px; }
        .nav { background:var(--card-bg); border-radius:40px; padding:12px 16px; display:flex; flex-direction:column; gap:12px; margin-bottom:12px; border:1px solid var(--border); }
        .nav h2 { font-size:1.1rem; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; margin:0; display:flex; align-items:center; justify-content:center; gap:6px; }
        .nav-buttons { display:flex; gap:8px; overflow-x:auto; white-space:nowrap; padding-bottom:4px; }
        .nav-btn { padding:4px 12px; background:transparent; border:1px solid var(--border); border-radius:40px; cursor:pointer; font-size:11px; color:var(--gray); display:inline-flex; align-items:center; gap:4px; text-decoration:none; }
        .nav-btn svg { width:14px; height:14px; stroke:currentColor; stroke-width:2; fill:none; }
        .nav-btn:hover { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:var(--dark); border-color:transparent; }
        .container { max-width:900px; margin:0 auto; }
        .card { background:var(--card-bg); border-radius:20px; padding:16px; border:1px solid var(--border); margin-bottom:16px; }
        .btn { padding:8px 16px; border-radius:40px; font-weight:600; font-size:0.8rem; cursor:pointer; transition:0.2s; display:inline-flex; align-items:center; gap:6px; background:var(--darker); color:var(--light); border:1px solid var(--border); }
        .btn-danger { background:var(--danger); color:white; border:none; }
        .result-score { font-size:2rem; font-weight:bold; }
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--primary); color:var(--dark); padding:6px 14px; border-radius:40px; font-size:11px; z-index:10001; }
        .answer-item { padding:10px; margin:8px 0; border-left:4px solid; border-radius:12px; background:var(--darker); }
    </style>
</head>
<body>
    <div class="premium-banner" id="premiumBanner">
        <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15 9 22 9 16 14 19 22 12 17 5 22 8 14 2 9 9 9 12 2"/></svg> FREE ACCOUNT</span>
        <span class="premium-badge">2 files | 5 Q/file</span>
        <button class="upgrade-btn" onclick="window.location.href='payment_dashboard.html'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg> Upgrade</button>
    </div>
    <div class="nav">
        <h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg> ExamMaster Pro</h2>
        <div class="nav-buttons">
            <a href="index.html" class="nav-btn"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H10v8H5a2 2 0 0 1-2-2z"/></svg> Home</a>
            <a href="files.html" class="nav-btn"><svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg> Files</a>
            <a href="json_editor.html" class="nav-btn"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> JSON</a>
            <a href="results.html" class="nav-btn" style="background:linear-gradient(135deg,var(--primary),var(--secondary)); color:var(--dark);"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> Results</a>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
                <h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Practice History</h2>
                <button class="btn btn-danger" id="clear-results"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Clear All</button>
            </div>
            <div id="results-list"></div>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
        // Premium UI (same)
        function getPremium() { return JSON.parse(localStorage.getItem('premium') || '{"active":false}'); }
        function updatePremiumUI() {
            const premium = getPremium();
            const banner = document.getElementById('premiumBanner');
            const gemIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15 9 22 9 16 14 19 22 12 17 5 22 8 14 2 9 9 9 12 2"/></svg>';
            const crownIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4l4 8 6-6 6 6 4-8-6 4-4-6-4 6-6-4z"/><path d="M4 20h16"/></svg>';
            if (premium.active) {
                banner.innerHTML = `<span>${crownIcon} PREMIUM ACCOUNT</span><span class="premium-badge">Unlimited</span>`;
                banner.style.background = 'linear-gradient(135deg, #f59e0b, #d97706)';
            } else {
                banner.innerHTML = `<span>${gemIcon} FREE ACCOUNT</span><span class="premium-badge">2 files | 5 Q/file</span><button class="upgrade-btn" onclick="window.location.href=\'payment_dashboard.html\'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg> Upgrade</button>`;
            }
        }
        updatePremiumUI();

        function showToast(msg) { const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
        function getResults() { return JSON.parse(localStorage.getItem('exam_results')||'[]'); }
        function saveResults(r) { localStorage.setItem('exam_results', JSON.stringify(r)); }

        function renderResults() {
            const results = getResults().reverse();
            const container = document.getElementById('results-list');
            if (!results.length) { container.innerHTML = '<p>No results yet.</p>'; return; }
            container.innerHTML = results.map((r,idx) => `
                <div class="card" style="margin-bottom:12px;">
                    <div style="display:flex; justify-content:space-between;">
                        <h3>${escapeHtml(r.examTitle||r.fileTitle)}</h3>
                        <span class="result-score" style="color:${r.percentage>=70?'var(--success)':'var(--danger)'}">${r.percentage}%</span>
                    </div>
                    <p>${r.score}/${r.total} correct · ${new Date(r.date).toLocaleString()}</p>
                    <button class="btn toggle-review" data-index="${idx}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> Review</button>
                    <button class="btn btn-danger delete-result" data-index="${idx}" style="margin-left:8px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
                    <div id="review-${idx}" style="display:none; margin-top:12px;">
                        ${(r.answers||[]).map(a => `<div class="answer-item" style="border-left-color:${a.isCorrect?'var(--success)':'var(--danger)'}"><strong>Q: ${escapeHtml(a.text)}</strong><br>Your: ${escapeHtml(a.userAnswer)}<br>Correct: ${escapeHtml(a.correctAnswer)}<br><small>${escapeHtml(a.explanation)}</small></div>`).join('')}
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.toggle-review').forEach(b => b.addEventListener('click', () => {
                const div = document.getElementById(`review-${b.dataset.index}`);
                div.style.display = div.style.display === 'none' ? 'block' : 'none';
            }));
            document.querySelectorAll('.delete-result').forEach(b => b.addEventListener('click', () => {
                if(confirm('Delete?')) {
                    const idx = parseInt(b.dataset.index);
                    const res = getResults(); res.splice(res.length-1-idx, 1);
                    saveResults(res); renderResults(); showToast('Deleted');
                }
            }));
        }
        document.getElementById('clear-results').addEventListener('click', () => { if(confirm('Clear all?')) { saveResults([]); renderResults(); showToast('Cleared'); } });
        function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
        renderResults();
    </script>
</body>
</html>
