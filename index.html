<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ExamMaster Pro</title>
    <link rel="stylesheet" href="lib/katex/katex.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Primary: Deep Purple (Left/Right Accents) */
            --purple-primary:   #a834eb;
            --purple-dark:      #8b1dd9;
            --purple-light:     #c957f0;
            
            /* Secondary: Lavender (Center/Soft Accents) */
            --lavender-primary: #cbc2cf;
            --lavender-dark:    #a89aaf;
            --lavender-light:   #e8e4ed;
            
            /* Tertiary: Supporting Colors */
            --accent-warm:      #ff6b9d;
            --accent-cool:      #6b5fff;
            --success:          #00d68f;
            --warning:          #f59e0b;
            --error:            #ef4444;
            
            /* Surfaces with Purple Integration */
            --surface-0:        #0f0a1a;
            --surface-1:        #1a1328;
            --surface-2:        #261d3d;
            --surface-3:        #3a2e55;
            --surface-4:        #4d3d6b;
            
            /* Text Hierarchy */
            --text-hi:          #f5f1fb;
            --text-md:          #d4c9e0;
            --text-lo:          #9b8ab5;
            
            /* Borders & Dividers */
            --rim:              rgba(200, 150, 255, 0.15);
            --rim-strong:       rgba(168, 52, 235, 0.25);
            
            /* Spacing & Radii */
            --radius-xl:        24px;
            --radius-lg:        18px;
            --radius-md:        12px;
            --radius-sm:        8px;
            
            /* Safe Area */
            --safe-bottom:      env(safe-area-inset-bottom, 0px);
            
            /* Typography */
            --font-head:        'Syne', sans-serif;
            --font-body:        'DM Sans', sans-serif;
            
            /* Glows */
            --glow-purple:      0 0 24px rgba(168, 52, 235, 0.25);
            --glow-lavender:    0 0 24px rgba(203, 194, 207, 0.15);
            --glow-accent:      0 0 24px rgba(107, 95, 255, 0.2);
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, var(--surface-0) 0%, var(--surface-1) 50%, var(--surface-0) 100%);
            color: var(--text-hi);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: max(16px, var(--safe-bottom));
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(168, 52, 235, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(203, 194, 207, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(107, 95, 255, 0.04) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        .app-wrapper { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 14px; }

        /* ── ANIMATIONS ─────────────────────────────────── */
        @keyframes fadeUp   { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
        @keyframes spin     { to { transform: rotate(360deg); } }
        @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.55; } }
        @keyframes glow-ping { 0% { box-shadow: 0 0 0 0 rgba(168, 52, 235, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(168, 52, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(168, 52, 235, 0); } }

        .anim-0 { animation: fadeUp 0.35s ease both; }
        .anim-1 { animation: fadeUp 0.35s 0.05s ease both; }
        .anim-2 { animation: fadeUp 0.35s 0.10s ease both; }
        .anim-3 { animation: fadeUp 0.35s 0.15s ease both; }
        .anim-4 { animation: fadeUp 0.35s 0.20s ease both; }

        /* ── LOADING OVERLAY ─────────────────────────────── */
        #loadingOverlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, var(--surface-0) 0%, var(--surface-1) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 99999; transition: opacity 0.6s;
        }
        .loader-logo {
            font-family: var(--font-head); font-size: 2rem; font-weight: 800;
            background: linear-gradient(135deg, var(--purple-primary), var(--lavender-primary), var(--accent-cool));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 32px; letter-spacing: -0.5px;
        }
        .loader-ring {
            width: 56px; height: 56px;
            border: 3px solid var(--surface-3);
            border-top-color: var(--purple-primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 24px;
        }
        .loader-label { font-size: 0.8rem; color: var(--text-md); margin-bottom: 16px; letter-spacing: 0.05em; }
        .loader-track { width: 200px; height: 3px; background: var(--surface-3); border-radius: 99px; overflow: hidden; }
        .loader-fill  { height: 100%; background: linear-gradient(90deg, var(--purple-primary), var(--lavender-primary)); transition: width 0.3s; }

        /* ── PREMIUM BANNER ──────────────────────────────── */
        .premium-banner {
            background: linear-gradient(135deg, rgba(168, 52, 235, 0.1) 0%, rgba(203, 194, 207, 0.05) 100%);
            border: 1px solid var(--rim-strong);
            border-radius: var(--radius-lg);
            padding: 8px 16px;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
            font-size: 0.72rem;
            backdrop-filter: blur(10px);
        }
        .premium-banner span { color: var(--text-hi); font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .premium-pill {
            background: linear-gradient(135deg, rgba(168, 52, 235, 0.15), rgba(203, 194, 207, 0.1));
            color: var(--lavender-light);
            padding: 3px 10px; border-radius: 99px; font-size: 10px; font-weight: 700;
            border: 1px solid rgba(203, 194, 207, 0.3);
        }
        .upgrade-btn {
            background: linear-gradient(135deg, var(--purple-primary), var(--accent-cool));
            color: white; padding: 4px 12px; border-radius: 99px;
            cursor: pointer; border: none; font-size: 10px; font-weight: 700;
            display: flex; align-items: center; gap: 4px; transition: transform 0.15s, box-shadow 0.15s;
            font-family: var(--font-head);
        }
        .upgrade-btn:hover { transform: scale(1.05); box-shadow: var(--glow-purple); }

        /* ── NAV ─────────────────────────────────────────── */
        .nav {
            background: linear-gradient(135deg, var(--surface-1) 0%, rgba(26, 19, 40, 0.8) 100%);
            border: 1px solid var(--rim);
            border-radius: var(--radius-xl);
            padding: 12px 16px;
            display: flex; flex-direction: column; gap: 12px;
            backdrop-filter: blur(10px);
        }
        .nav-brand {
            font-family: var(--font-head); font-size: 1.05rem; font-weight: 800;
            background: linear-gradient(135deg, var(--purple-primary) 0%, var(--lavender-primary) 50%, var(--accent-cool) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px;
            letter-spacing: -0.3px;
        }
        .nav-brand svg { flex-shrink: 0; }
        .nav-buttons { display: flex; gap: 6px; overflow-x: auto; white-space: nowrap; padding-bottom: 2px; scrollbar-width: none; }
        .nav-buttons::-webkit-scrollbar { display: none; }
        .nav-btn {
            padding: 7px 16px; background: transparent;
            border: 1px solid var(--rim);
            border-radius: 99px; cursor: pointer; font-size: 11px; font-weight: 500;
            color: var(--text-md); font-family: var(--font-body);
            display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.18s; flex-shrink: 0;
        }
        .nav-btn svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2; fill: none; }
        .nav-btn:hover { color: var(--text-hi); border-color: rgba(203, 194, 207, 0.3); transform: translateY(-1px); }
        .nav-btn.active {
            background: linear-gradient(135deg, var(--purple-primary), var(--purple-dark));
            color: white; border-color: transparent; font-weight: 700;
            box-shadow: var(--glow-purple);
        }

        /* ── MAIN GRID ───────────────────────────────────── */
        .main-grid { display: grid; grid-template-columns: 1fr 290px; gap: 14px; align-items: start; }
        .content-area { display: flex; flex-direction: column; gap: 14px; }

        /* ── STAT CARDS ──────────────────────────────────── */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
        .stat-card {
            background: linear-gradient(135deg, rgba(168, 52, 235, 0.1), rgba(203, 194, 207, 0.05));
            border: 1px solid var(--rim-strong);
            border-radius: var(--radius-xl);
            padding: 18px 14px; text-align: center;
            cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .stat-card::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(168, 52, 235, 0.04), transparent);
            opacity: 0; transition: opacity 0.2s;
        }
        .stat-card:hover { border-color: rgba(168, 52, 235, 0.5); transform: translateY(-3px); box-shadow: var(--glow-purple); }
        .stat-card:hover::after { opacity: 1; }
        .stat-number {
            font-family: var(--font-head); font-size: 2rem; font-weight: 800;
            background: linear-gradient(135deg, var(--purple-primary), var(--lavender-primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .stat-label { font-size: 0.72rem; color: var(--text-md); margin-top: 5px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }

        /* ── CARDS ───────────────────────────────────────── */
        .card {
            background: linear-gradient(135deg, var(--surface-1) 0%, rgba(38, 29, 61, 0.6) 100%);
            border: 1px solid var(--rim);
            border-radius: var(--radius-xl);
            padding: 18px;
            backdrop-filter: blur(10px);
        }
        .card-title {
            font-family: var(--font-head); font-size: 0.85rem; font-weight: 700;
            color: var(--purple-primary); margin-bottom: 14px;
            display: flex; align-items: center; gap: 7px; letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .card-title svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; flex-shrink: 0; }

        /* ── TOOLBAR BUTTONS ─────────────────────────────── */
        .action-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .icon-btn {
            padding: 8px 16px; background: linear-gradient(135deg, var(--surface-2), var(--surface-3));
            border: 1px solid var(--rim);
            border-radius: 99px; cursor: pointer; font-size: 11px; font-weight: 600;
            color: var(--text-md); font-family: var(--font-body);
            display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.18s;
        }
        .icon-btn svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2; fill: none; }
        .icon-btn:hover { background: var(--purple-primary); color: white; border-color: transparent; box-shadow: var(--glow-purple); transform: translateY(-1px); }
        .icon-btn.accent { background: linear-gradient(135deg, var(--accent-cool), var(--accent-warm)); color: white; border-color: transparent; }
        .icon-btn.accent:hover { box-shadow: var(--glow-accent); }

        /* ── RECENT RESULTS (home) ───────────────────────── */
        .result-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--rim);
            font-size: 0.85rem;
        }
        .result-row:last-child { border-bottom: none; padding-bottom: 0; }
        .result-row-name { color: var(--text-hi); font-weight: 500; }
        .result-row-pct { font-family: var(--font-head); font-weight: 700; font-size: 0.95rem; }
        .pct-pass { color: var(--success); }
        .pct-fail { color: var(--error); }

        /* ── FILE MANAGER (sidebar) ──────────────────────── */
        .file-manager {
            background: linear-gradient(135deg, var(--surface-1), rgba(38, 29, 61, 0.5));
            border: 1px solid var(--rim);
            border-radius: var(--radius-xl);
            padding: 16px;
            position: sticky; top: 12px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .file-manager-title {
            font-family: var(--font-head); font-size: 0.8rem; font-weight: 700;
            color: var(--purple-primary); margin-bottom: 12px;
            display: flex; align-items: center; gap: 6px;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .file-manager-title svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }
        .file-search input {
            width: 100%; padding: 8px 14px;
            background: var(--surface-2); border: 1px solid var(--rim);
            border-radius: 99px; color: var(--text-hi); font-size: 11px;
            font-family: var(--font-body); margin-bottom: 10px; outline: none;
            transition: border-color 0.2s;
        }
        .file-search input:focus { border-color: rgba(168, 52, 235, 0.4); }
        .file-list { max-height: 420px; overflow-y: auto; overflow-x: hidden; scrollbar-width: thin; scrollbar-color: var(--surface-4) transparent; }
        .file-item {
            display: flex; align-items: flex-start; justify-content: space-between;
            padding: 10px 12px; background: var(--surface-2);
            border-radius: var(--radius-md); margin-bottom: 6px;
            cursor: pointer; border: 1px solid transparent;
            transition: all 0.18s; font-size: 11px;
        }
        .file-item:hover { border-color: rgba(168, 52, 235, 0.3); background: var(--surface-3); transform: translateX(3px); }
        .file-info { flex: 1; min-width: 0; overflow: hidden; }
        .file-title { font-weight: 600; margin-bottom: 4px; word-break: break-word; line-height: 1.3; color: var(--text-hi); }
        .file-meta { display: flex; flex-wrap: wrap; gap: 6px 10px; font-size: 9.5px; color: var(--text-lo); }
        .file-meta span { display: inline-flex; align-items: center; gap: 3px; }
        .file-meta svg { width: 9px; height: 9px; stroke: currentColor; stroke-width: 2; fill: none; }
        .file-actions { display: flex; gap: 2px; margin-left: 8px; flex-shrink: 0; }
        .file-actions button {
            background: none; border: none; color: var(--text-lo);
            cursor: pointer; padding: 5px; border-radius: 6px;
            display: inline-flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .file-actions button:hover { background: var(--surface-4); color: var(--text-hi); }
        .file-actions .btn-play:hover { background: var(--purple-primary); color: white; }
        .file-actions .btn-del:hover  { background: var(--error); color: white; }
        .file-actions svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2; fill: none; }

        /* ── BUTTONS ─────────────────────────────────────── */
        .btn {
            padding: 9px 18px; border-radius: 99px; font-weight: 600; font-size: 0.78rem;
            cursor: pointer; transition: all 0.18s; display: inline-flex; align-items: center; gap: 7px;
            background: var(--surface-2); color: var(--text-hi); border: 1px solid var(--rim);
            font-family: var(--font-body);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.35); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-primary { background: linear-gradient(135deg, var(--purple-primary), var(--purple-dark)); color: white; border: none; font-weight: 700; }
        .btn-primary:hover { box-shadow: var(--glow-purple); }
        .btn-outline { background: transparent; border-color: rgba(203, 194, 207, 0.2); color: var(--text-md); }
        .btn-outline:hover { border-color: var(--purple-primary); color: var(--text-hi); }
        .btn-danger  { background: transparent; border-color: rgba(239, 68, 68, 0.3); color: var(--error); }
        .btn-danger:hover  { background: var(--error); color: white; }
        .btn-sm { padding: 6px 14px; font-size: 0.72rem; }
        .btn svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2; fill: none; }

        /* ── FORM ELEMENTS ───────────────────────────────── */
        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 10px 16px;
            background: var(--surface-2); border: 1px solid var(--rim);
            border-radius: var(--radius-md); color: var(--text-hi); font-size: 13px;
            font-family: var(--font-body); outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: rgba(168, 52, 235, 0.4);
            box-shadow: 0 0 0 3px rgba(168, 52, 235, 0.08);
        }
        .form-select option { background: var(--surface-2); }
        .form-label { font-size: 10.5px; font-weight: 600; color: var(--text-lo); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group { margin-bottom: 14px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; margin-bottom: 0; }

        /* ── MODALS ──────────────────────────────────────── */
        .modal {
            display: none; position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
        }
        .modal-content {
            background: linear-gradient(135deg, var(--surface-1) 0%, var(--surface-2) 100%);
            margin: 2% auto; width: 95%; max-width: 820px;
            border-radius: 28px; height: 92%; display: flex; flex-direction: column;
            border: 1px solid rgba(168, 52, 235, 0.2);
            box-shadow: 0 0 60px rgba(168, 52, 235, 0.1), 0 32px 64px rgba(0,0,0,0.6);
            animation: fadeUp 0.25s ease;
        }
        .modal-header {
            padding: 16px 20px; border-bottom: 1px solid var(--rim);
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        .modal-header h3 {
            font-family: var(--font-head); font-size: 1rem; font-weight: 700;
            color: var(--purple-primary); display: flex; align-items: center; gap: 8px;
        }
        .modal-header h3 svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 2; fill: none; }
        .modal-close { font-size: 22px; cursor: pointer; color: var(--text-lo); line-height: 1; transition: color 0.15s; background: none; border: none; }
        .modal-close:hover { color: var(--error); }
        .modal-body { padding: 18px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

        /* ── PRACTICE MODAL ──────────────────────────────── */
        .practice-container { display: flex; flex-direction: column; height: 100%; }
        .practice-top-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; gap: 12px;
        }
        .timer-container { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .timer {
            display: flex; align-items: center; gap: 8px;
            font-family: var(--font-head); font-size: 1.25rem; font-weight: 700;
            color: var(--error); padding: 8px 20px;
            background: rgba(239, 68, 68, 0.08); border-radius: 99px;
            border: 1.5px solid rgba(239, 68, 68, 0.35);
            cursor: pointer; transition: all 0.25s; user-select: none;
        }
        .timer:hover { background: rgba(239, 68, 68, 0.15); transform: scale(1.02); }
        .timer.paused { color: var(--warning); border-color: rgba(245, 158, 11, 0.4); background: rgba(245, 158, 11, 0.08); }
        .timer.warning { animation: pulse 1.1s infinite; }
        .timer-status { font-size: 10px; color: var(--text-lo); transition: color 0.2s; }
        .timer-status.paused { color: var(--warning); }

        .question-counter {
            font-family: var(--font-head); font-size: 1.1rem; font-weight: 700;
            color: var(--purple-primary); padding: 8px 22px;
            background: rgba(168, 52, 235, 0.08); border-radius: 99px;
            border: 1.5px solid rgba(168, 52, 235, 0.3);
        }
        .progress-bar { height: 4px; background: var(--surface-3); border-radius: 99px; overflow: hidden; margin-bottom: 18px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple-primary), var(--lavender-primary)); transition: width 0.3s ease; }

        .questions-scroll-area { flex: 1; overflow-y: auto; margin-bottom: 16px; padding-right: 4px; }
        .question-card {
            background: var(--surface-2); border-radius: var(--radius-xl);
            padding: 20px; border: 1px solid var(--rim);
        }
        .question-text {
            font-size: 1.05rem; font-weight: 500; margin-bottom: 18px; line-height: 1.55;
            color: var(--text-hi);
        }
        .options-grid { display: flex; flex-direction: column; gap: 9px; }
        .option-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            background: var(--surface-3); border-radius: var(--radius-md);
            cursor: pointer; border: 1px solid var(--rim);
            transition: all 0.18s;
        }
        .option-item:hover { background: var(--surface-4); border-color: rgba(168, 52, 235, 0.3); transform: translateX(4px); }
        .option-item.selected { border-color: var(--purple-primary); background: rgba(168, 52, 235, 0.07); }
        .option-item input[type="radio"] { width: 15px; height: 15px; accent-color: var(--purple-primary); flex-shrink: 0; }
        .option-label { font-size: 0.92rem; color: var(--text-hi); flex: 1; line-height: 1.45; }

        .exam-controls {
            display: flex; justify-content: space-between; gap: 7px;
            background: var(--surface-2); padding: 10px 12px;
            border-radius: 99px; border: 1px solid var(--rim);
            flex-shrink: 0; margin-top: auto;
        }
        .exam-controls .btn { flex: 1; justify-content: center; padding: 10px 6px; font-size: 0.73rem; }

        /* ── REVEAL PANEL ────────────────────────────────── */
        .reveal-panel {
            background: var(--surface-2); border-radius: var(--radius-lg);
            padding: 18px; border-left: 3px solid var(--purple-primary); margin-top: 16px;
        }
        .reveal-panel .correct-answer {
            color: var(--purple-primary); font-weight: 600; margin-bottom: 10px;
            display: flex; align-items: center; gap: 8px; font-size: 0.95rem;
        }
        .reveal-panel .correct-answer svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 2.5; fill: none; }
        .explanation { line-height: 1.65; font-size: 0.9rem; color: var(--text-md); }
        .explanation p { margin: 0.7em 0; }
        .explanation strong { color: var(--purple-primary); }
        .explanation .katex-display { margin: 1em 0; overflow-x: auto; }
        .explanation-content { color: var(--text-md); font-size: 0.88rem; line-height: 1.65; }
        .explanation-content p { margin: 0.4em 0; }
        .explanation-content .katex-display { margin: 0.6em 0; overflow-x: auto; }

        /* ── RESULTS PAGE ────────────────────────────────── */
        .result-card {
            background: var(--surface-1); border-radius: var(--radius-xl);
            padding: 18px; border: 1px solid var(--rim); margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .result-card:hover { border-color: rgba(168, 52, 235, 0.25); }
        .result-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 12px; }
        .result-title { font-family: var(--font-head); font-weight: 700; font-size: 0.95rem; color: var(--text-hi); }
        .result-score {
            font-family: var(--font-head); font-weight: 800; font-size: 1.4rem;
            flex-shrink: 0;
        }
        .result-score.excellent { color: var(--success); }
        .result-score.good      { color: var(--purple-light); }
        .result-score.average   { color: var(--warning); }
        .result-score.poor      { color: var(--error); }
        .result-meta { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; color: var(--text-lo); margin-bottom: 10px; }
        .result-meta span { display: flex; align-items: center; gap: 4px; }
        .result-meta svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 2; fill: none; }
        .result-summary { display: flex; gap: 18px; font-size: 12px; color: var(--text-md); border-top: 1px dashed var(--rim); padding-top: 10px; }
        .result-summary-item { display: flex; align-items: center; gap: 6px; }
        .result-actions { display: flex; gap: 9px; margin-top: 12px; }
        .btn-review {
            flex: 1; background: transparent; border: 1px solid rgba(168, 52, 235, 0.3); color: var(--purple-primary);
            padding: 9px 14px; border-radius: 99px; font-weight: 600; font-size: 0.75rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.18s;
            font-family: var(--font-body);
        }
        .btn-review:hover { background: var(--purple-primary); color: white; }
        .clear-all-btn {
            background: transparent; border: 1px solid rgba(239, 68, 68, 0.3); color: var(--error);
            padding: 7px 16px; border-radius: 99px; font-weight: 600; font-size: 0.75rem; cursor: pointer;
            display: flex; align-items: center; gap: 6px; transition: all 0.18s; font-family: var(--font-body);
        }
        .clear-all-btn:hover { background: var(--error); color: white; }

        /* ── REVIEW DETAILS ──────────────────────────────── */
        .review-details { display: none; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--rim); }
        .review-details.show { display: block; }
        .review-question-item {
            background: var(--surface-2); border-radius: var(--radius-md);
            margin-bottom: 8px; overflow: hidden; border: 1px solid var(--rim);
        }
        .review-question-header {
            display: flex; align-items: center; gap: 10px; padding: 11px 14px;
            cursor: pointer; transition: background 0.15s;
        }
        .review-question-header:hover { background: var(--surface-3); }
        .review-status-icon {
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0;
        }
        .review-status-icon.correct   { background: var(--success); color: #030d0a; }
        .review-status-icon.incorrect { background: var(--warning); color: #0d0d0d; }
        .review-question-text { flex: 1; font-size: 0.88rem; word-break: break-word; }
        .review-question-details {
            display: none; padding: 0 14px 14px 46px; font-size: 0.85rem;
            border-top: 1px solid var(--rim); background: rgba(0,0,0,0.12);
        }
        .review-question-details.show { display: block; }
        .answer-row { margin: 9px 0; line-height: 1.5; }
        .answer-label { color: var(--text-lo); margin-right: 6px; font-weight: 500; }
        .answer-value { color: var(--text-hi); }
        .answer-value.correct-answer { color: var(--purple-primary); }

        /* ── CREATE / WIZARD ─────────────────────────────── */
        .step-wizard { display: flex; gap: 18px; }
        .step-indicator {
            width: 155px; flex-shrink: 0; background: var(--surface-2);
            border-radius: var(--radius-xl); padding: 16px 14px;
            border: 1px solid var(--rim); height: fit-content; position: sticky; top: 12px;
        }
        .step-item {
            display: flex; align-items: center; gap: 10px; padding: 11px 0;
            border-bottom: 1px solid var(--rim); color: var(--text-lo); transition: color 0.2s; cursor: pointer;
        }
        .step-item:last-child { border-bottom: none; }
        .step-item.active { color: var(--purple-primary); }
        .step-item.completed { color: var(--text-md); }
        .step-number {
            width: 30px; height: 30px; border-radius: 50%; background: var(--surface-3);
            border: 2px solid var(--rim); display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 12px; transition: all 0.2s; flex-shrink: 0;
            font-family: var(--font-head);
        }
        .step-item.active .step-number { background: var(--purple-primary); border-color: var(--purple-primary); color: white; animation: glow-ping 1.8s infinite; }
        .step-item.completed .step-number { background: var(--surface-4); border-color: rgba(168, 52, 235, 0.4); color: var(--purple-primary); }

        /* ── RESPONSIVE ──────────────────────────────────── */
        @media (max-width: 820px) {
            .main-grid { grid-template-columns: 1fr; }
            .step-wizard { flex-direction: column; }
            .step-indicator { width: 100%; position: static; }
        }
        @media (max-width: 500px) {
            body { padding: 10px; }
            .form-row { flex-direction: column; }
        }

        /* ── SCROLLBARS ──────────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 99px; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<!-- Loading Overlay -->
<div id="loadingOverlay">
    <div class="loader-logo">ExamMaster Pro</div>
    <div class="loader-ring"></div>
    <div class="loader-label" id="loadingStatus">Initializing…</div>
    <div class="loader-track"><div class="loader-fill" id="loadingProgressBar" style="width:0%"></div></div>
</div>

<div class="app-wrapper">

    <!-- Premium Banner -->
    <div class="premium-banner anim-0" id="premiumBanner">
        <span>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15 9 22 9 16 14 19 22 12 17 5 22 8 14 2 9 9 9 12 2"/></svg>
            FREE ACCOUNT
        </span>
        <span class="premium-pill">2 files · 5 Q/file</span>
        <button class="upgrade-btn" onclick="window.location.href='payment_dashboard.html'">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            Upgrade
        </button>
    </div>

    <!-- Nav -->
    <div class="nav anim-1">
        <div class="nav-brand">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            ExamMaster Pro
        </div>
        <div class="nav-buttons">
            <button class="nav-btn active" data-page="home">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H10v8H5a2 2 0 0 1-2-2z"/></svg>
                Home
            </button>
            <button class="nav-btn" data-page="files">
                <svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
                Files
            </button>
            <button class="nav-btn" data-page="results">
                <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                Results
            </button>
            <button class="nav-btn" data-page="create">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Create
            </button>
        </div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid anim-2">
        <div id="contentArea" class="content-area"></div>
        <div id="fileManagerPanel" class="file-manager" style="display:none;">
            <div class="file-manager-title">
                <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                Exams
            </div>
            <div class="file-search">
                <input type="text" id="fileSearchInput" placeholder="🔍 Filter exams…">
            </div>
            <div id="fileList" class="file-list"></div>
        </div>
    </div>
</div>

<!-- ── PRACTICE MODAL ──────────────────────────────────────────────── -->
<div id="practiceModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Exam
            </h3>
            <button class="modal-close" onclick="closePracticeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="practice-container">
                <div class="practice-top-bar">
                    <div class="timer-container">
                        <div class="timer" id="timerDisplay" onclick="toggleTimerPause()" title="Click to pause/resume">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            <span id="timerText">00:00</span>
                            <span id="pauseIndicator" style="font-size:11px;"></span>
                        </div>
                        <div class="timer-status" id="timerStatus">tap to pause</div>
                    </div>
                    <div class="question-counter" id="questionCounter">1 / 10</div>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="questions-scroll-area" id="questionsScrollArea">
                    <div id="questionDisplay"></div>
                    <div id="revealPanel" style="display:none; margin-top:16px;"></div>
                </div>
                <div class="exam-controls">
                    <button class="btn btn-outline" id="prevBtn">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        Prev
                    </button>
                    <button class="btn btn-outline" id="revealAnswerBtn" onclick="toggleRevealAnswer()">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                        Reveal
                    </button>
                    <button class="btn btn-outline" id="nextBtn">
                        Next
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                    <button class="btn btn-primary" id="submitBtn">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
                        Submit
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
